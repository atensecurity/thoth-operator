apiVersion: platform.atensecurity.com/v1alpha1
kind: ThothTenant
metadata:
  name: sample
  namespace: thoth-system
spec:
  tenantId: acme-security
  apexDomain: atensecurity.com
  authMode: auto
  authSecretRef:
    name: thoth-admin-token
    key: token
  settings:
    decisionWebhookEnabled: true
    decisionWebhookUrl: "https://hooks.example.com/thoth"
  packAssignments:
    - packIds:
        - soc2-type2
        - fedramp-moderate
      environment: prod
      allAgents: true
      mismatchBoost: 0.15
      delegationBoost: 0.10
      trustFloor: 0.35
      criticalThreshold: 0.85
  policyBundles:
    - name: trantor-mutual-global-dlp
      framework: OPA
      sourceUri: s3://thoth-policy-bundles/trantor/global-dlp/policy.rego
      assignments:
        - agent:coding-agent
        - agent:security-analyst-agent
      status: active
      enforcementMode: enforce
  webhookSettings:
    enabled: true
    url: "https://hooks.example.com/thoth"
    testWebhookOnApply: true
  governanceDecisionFieldBackfill:
    enabled: false
    limit: 500
    windowHours: 720
    includeBlockedEvents: true
    dryRun: true
  decisionMetadataExport:
    enabled: true
    intervalMinutes: 30
    batchLimit: 1000
    lookbackHours: 24
  policySync: true
