apiVersion: platform.atensecurity.com/v1alpha1
kind: ThothTenant
metadata:
  name: sample
  namespace: thoth-system
spec:
  tenantId: acme-security
  apexDomain: atensecurity.com
  authSecretRef:
    name: thoth-admin-token
    key: token
  settings:
    decisionWebhookEnabled: true
    decisionWebhookUrl: "https://hooks.example.com/thoth"
  packAssignments:
    - packIds:
        - soc2-type2
        - fedramp-moderate
      environment: prod
      allAgents: true
  governanceDecisionFieldBackfill:
    enabled: false
    limit: 500
    windowHours: 720
    includeBlockedEvents: true
    dryRun: true
  policySync: true
