apiVersion: v1
kind: Namespace
metadata:
  name: thoth-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: thoth-operator
  namespace: thoth-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: thoth-operator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: thoth-operator
    spec:
      serviceAccountName: thoth-operator
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: manager
          image: ghcr.io/atensecurity/thoth-operator:0.1.0
          imagePullPolicy: IfNotPresent
          args:
            - --leader-elect=true
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          env:
            - name: WATCH_NAMESPACE
              value: ""
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
