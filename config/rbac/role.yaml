apiVersion: v1
kind: ServiceAccount
metadata:
  name: thoth-operator
  namespace: thoth-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: thoth-operator
rules:
  - apiGroups: ["platform.atensecurity.com"]
    resources: ["thothtenants"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["platform.atensecurity.com"]
    resources: ["thothtenants/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["platform.atensecurity.com"]
    resources: ["thothtenants/finalizers"]
    verbs: ["update"]
  - apiGroups: [""]
    resources: ["secrets", "events"]
    verbs: ["get", "list", "watch", "create", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: thoth-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: thoth-operator
subjects:
  - kind: ServiceAccount
    name: thoth-operator
    namespace: thoth-system
