apiVersion: v1
kind: Secret
metadata:
  name: thoth-admin-token
  namespace: thoth-system
type: Opaque
stringData:
  token: "REPLACE_WITH_THOTH_ADMIN_BEARER_TOKEN"
---
apiVersion: platform.atensecurity.com/v1alpha1
kind: ThothTenant
metadata:
  name: demo-tenant
  namespace: thoth-system
spec:
  tenantId: demo-tenant
  apexDomain: atensecurity.com
  authSecretRef:
    name: thoth-admin-token
    key: token
  settings:
    enforceMcpPolicies: true
    approvalMode: "step_up"
  packAssignments:
    - packIds:
        - soc2-type2
        - gdpr-ai-agents
      environment: prod
      allAgents: true
      approvalPolicyId: default
  mdmProvider:
    provider: kandji
    endpointUrl: "https://tenant.api.kandji.io"
    enabled: true
  governanceEvidenceBackfill:
    enabled: true
    limit: 200
    includeBlockedEvents: true
    integrationId: thoth-runtime
    dryRun: false
  governanceDecisionFieldBackfill:
    enabled: true
    limit: 500
    windowHours: 720
    includeBlockedEvents: true
    dryRun: false
  policySync: true
