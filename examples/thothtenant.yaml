apiVersion: platform.atensecurity.com/v1alpha1
kind: ThothTenant
metadata:
  name: demo-tenant
  namespace: thoth-system
spec:
  tenantId: demo-tenant
  apexDomain: atensecurity.com
  authMode: auto
  authSecretRef:
    name: thoth-admin-token
    key: token
  settings:
    enforceMcpPolicies: true
    approvalMode: "step_up"
  webhookSettings:
    enabled: true
    url: "https://hooks.example.com/thoth"
    testWebhookOnApply: true
  mcpVendorRegistry:
    enabled: true
    observeOnly: false
    passThroughApproved: true
    vendors:
      - vendorId: openai
        displayName: OpenAI
        approved: true
        hostPatterns:
          - api.openai.com
          - "*.openai.com"
        source: manual
        notes: Approved by security engineering.
      - vendorId: partner-api
        displayName: Partner API
        approved: true
        hostPatterns:
          - api.partner.example
        source: discovered
        notes: Vendor surfaced in endpoint telemetry.
  policyBundles:
    - name: trantor-mutual-global-dlp
      framework: OPA
      sourceUri: "s3://thoth-policy-bundles/trantor/global-dlp/policy.rego"
      s3VersionId: "v2"
      expectedHash: "sha256:1111111111111111111111111111111111111111111111111111111111111111"
      assignments:
        - agent:coding-agent
        - agent:security-analyst-agent
      status: active
      enforcementMode: enforce
    - name: trantor-mutual-security-analyst
      framework: CEDAR
      sourceUri: "s3://thoth-policy-bundles/trantor/security-analyst/policy.cedar"
      assignments:
        - agent:security-analyst-agent
      status: active
      enforcementMode: enforce
  packAssignments:
    - packIds:
        - soc2-type2
        - gdpr-ai-agents
      environment: prod
      allAgents: true
      approvalPolicyId: default
      mismatchBoost: 0.15
      delegationBoost: 0.10
      trustFloor: 0.35
      criticalThreshold: 0.85
  mdmProvider:
    provider: kandji
    endpointUrl: "https://tenant.api.kandji.io"
    enabled: true
  mdmSync:
    enabled: true
    providerName: kandji
    waitForCompletion: true
    pollIntervalSeconds: 10
    timeoutSeconds: 300
  governanceEvidenceBackfill:
    enabled: true
    limit: 200
    includeBlockedEvents: true
    integrationId: thoth-runtime
    dryRun: false
  governanceDecisionFieldBackfill:
    enabled: true
    limit: 500
    windowHours: 720
    includeBlockedEvents: true
    dryRun: false
  decisionMetadataExport:
    enabled: true
    intervalMinutes: 30
    batchLimit: 1000
    lookbackHours: 24
  policySync: true
