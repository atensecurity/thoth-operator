apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: thothtenants.platform.atensecurity.com
spec:
  group: platform.atensecurity.com
  names:
    kind: ThothTenant
    listKind: ThothTenantList
    plural: thothtenants
    singular: thothtenant
    shortNames:
      - thotht
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      additionalPrinterColumns:
        - name: Tenant
          type: string
          jsonPath: .spec.tenantId
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              required:
                - tenantId
                - authSecretRef
              properties:
                tenantId:
                  type: string
                  minLength: 1
                apexDomain:
                  type: string
                apiBaseURL:
                  type: string
                  format: uri
                authMode:
                  type: string
                authSecretRef:
                  type: object
                  required:
                    - name
                    - key
                  properties:
                    name:
                      type: string
                    key:
                      type: string
                settings:
                  type: object
                  additionalProperties:
                    x-kubernetes-preserve-unknown-fields: true
                mdmProvider:
                  type: object
                  required:
                    - provider
                  properties:
                    provider:
                      type: string
                      minLength: 1
                    endpointUrl:
                      type: string
                    enabled:
                      type: boolean
                    apiTokenSecretRef:
                      type: object
                      required:
                        - name
                        - key
                      properties:
                        name:
                          type: string
                        key:
                          type: string
                mdmSync:
                  type: object
                  properties:
                    enabled:
                      type: boolean
                    providerName:
                      type: string
                    waitForCompletion:
                      type: boolean
                    pollIntervalSeconds:
                      type: integer
                    timeoutSeconds:
                      type: integer
                webhookSettings:
                  type: object
                  properties:
                    enabled:
                      type: boolean
                    url:
                      type: string
                    secretRef:
                      type: object
                      required:
                        - name
                        - key
                      properties:
                        name:
                          type: string
                        key:
                          type: string
                    testWebhookOnApply:
                      type: boolean
                policyBundles:
                  type: array
                  items:
                    type: object
                    required:
                      - name
                      - framework
                    properties:
                      name:
                        type: string
                      description:
                        type: string
                      framework:
                        type: string
                      rawPolicy:
                        type: string
                      sourceUri:
                        type: string
                      s3Uri:
                        type: string
                      s3VersionId:
                        type: string
                      expectedHash:
                        type: string
                      assignments:
                        type: array
                        items:
                          type: string
                      status:
                        type: string
                      enforcementMode:
                        type: string
                packAssignments:
                  type: array
                  items:
                    type: object
                    required:
                      - packIds
                    properties:
                      packIds:
                        type: array
                        minItems: 1
                        items:
                          type: string
                      allAgents:
                        type: boolean
                      agentIds:
                        type: array
                        items:
                          type: string
                      fleetIds:
                        type: array
                        items:
                          type: string
                      endpointIds:
                        type: array
                        items:
                          type: string
                      environment:
                        type: string
                      approvalPolicyId:
                        type: string
                      overridesByPack:
                        type: object
                        additionalProperties:
                          x-kubernetes-preserve-unknown-fields: true
                      mismatchBoost:
                        type: number
                      delegationBoost:
                        type: number
                      trustFloor:
                        type: number
                      criticalThreshold:
                        type: number
                governanceEvidenceBackfill:
                  type: object
                  properties:
                    enabled:
                      type: boolean
                    limit:
                      type: integer
                      minimum: 1
                      maximum: 1000
                    includeBlockedEvents:
                      type: boolean
                    integrationId:
                      type: string
                    dryRun:
                      type: boolean
                governanceDecisionFieldBackfill:
                  type: object
                  properties:
                    enabled:
                      type: boolean
                    limit:
                      type: integer
                      minimum: 1
                      maximum: 5000
                    windowHours:
                      type: integer
                      minimum: 1
                      maximum: 2880
                    includeBlockedEvents:
                      type: boolean
                    dryRun:
                      type: boolean
                decisionMetadataExport:
                  type: object
                  properties:
                    enabled:
                      type: boolean
                    destinationUrl:
                      type: string
                    authTokenSecretRef:
                      type: object
                      required:
                        - name
                        - key
                      properties:
                        name:
                          type: string
                        key:
                          type: string
                    intervalMinutes:
                      type: integer
                      minimum: 1
                    batchLimit:
                      type: integer
                      minimum: 1
                      maximum: 5000
                    lookbackHours:
                      type: integer
                      minimum: 1
                      maximum: 336
                policySync:
                  type: boolean
            status:
              type: object
              properties:
                phase:
                  type: string
                observedGeneration:
                  type: integer
                  format: int64
                endpointUrl:
                  type: string
                lastWebhookTestAt:
                  type: string
                  format: date-time
                lastWebhookTestStatus:
                  type: string
                lastMdmSyncAt:
                  type: string
                  format: date-time
                lastMdmSyncJobId:
                  type: string
                lastMdmSyncStatus:
                  type: string
                lastPolicySyncAt:
                  type: string
                  format: date-time
                lastPolicyBundleApplyAt:
                  type: string
                  format: date-time
                appliedPolicyBundles:
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                      bundleId:
                        type: string
                      framework:
                        type: string
                      version:
                        type: integer
                        format: int64
                      policyHash:
                        type: string
                      status:
                        type: string
                      enforcementMode:
                        type: string
                      appliedAt:
                        type: string
                        format: date-time
                lastGovernanceEvidenceBackfillAt:
                  type: string
                  format: date-time
                lastGovernanceDecisionFieldBackfillAt:
                  type: string
                  format: date-time
                lastDecisionMetadataExportAt:
                  type: string
                  format: date-time
                lastDecisionMetadataRecordCount:
                  type: integer
                  format: int64
                lastDecisionMetadataApprovalCount:
                  type: integer
                  format: int64
                lastDecisionMetadataExportStatus:
                  type: string
                conditions:
                  type: array
                  items:
                    type: object
                    required:
                      - type
                      - status
                      - reason
                      - message
                      - lastTransitionTime
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      reason:
                        type: string
                      message:
                        type: string
                      observedGeneration:
                        type: integer
                        format: int64
                      lastTransitionTime:
                        type: string
                        format: date-time
      subresources:
        status: {}
